<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Analyse</title>

<link rel="apple-touch-icon" href="../logo.PNG">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Analyse">

<style>
body{
  font-family:-apple-system;
  background:#0b0b0c;
  color:white;
  margin:0;
  padding:15px;
}

.header{
  position:relative;
  height:60px;
  margin-bottom:10px;
}

.title{
  position:absolute;
  left:0;
  top:50%;
  transform:translateY(-50%);
  font-size:22px;
  font-weight:bold;
}

.logo{
  position:absolute;
  right:0;
  top:50%;
  transform:translateY(-50%);
  width:45px;
}

.box{
  background:#1c1c1f;
  padding:15px;
  border-radius:15px;
  margin-top:10px;
}

.smallTitle{
  font-weight:bold;
  margin-bottom:8px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Analyse 📊</div>
  <img src="../logo.PNG" class="logo">
</div>

<div id="out"></div>

<script>
let data = JSON.parse(localStorage.getItem("sales") || "[]");

let now = new Date();
let todayTotal = 0;
let weekTotal = 0;
let monthTotal = 0;
let yearTotal = 0;
let totalTotal = 0;

let serviceCount = {};
let customerTotal = {};

data.forEach(entry => {
  let d = new Date(entry.date);
  totalTotal += entry.total;

  if(d.toDateString() === now.toDateString()){
    todayTotal += entry.total;
  }

  let diffDays = (now - d) / (1000 * 60 * 60 * 24);
  if(diffDays <= 7){
    weekTotal += entry.total;
  }

  if(d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()){
    monthTotal += entry.total;
  }

  if(d.getFullYear() === now.getFullYear()){
    yearTotal += entry.total;
  }

  if(entry.services){
    entry.services.forEach(s => {
      serviceCount[s] = (serviceCount[s] || 0) + 1;
    });
  }

  if(entry.name){
    customerTotal[entry.name] = (customerTotal[entry.name] || 0) + entry.total;
  }
});

let topServices = Object.entries(serviceCount)
  .sort((a,b) => b[1] - a[1])
  .slice(0,5);

let topCustomers = Object.entries(customerTotal)
  .sort((a,b) => b[1] - a[1])
  .slice(0,10);

document.getElementById("out").innerHTML = `
  <div class="box">Heute: CHF ${todayTotal.toFixed(2)}</div>
  <div class="box">Woche: CHF ${weekTotal.toFixed(2)}</div>
  <div class="box">Monat: CHF ${monthTotal.toFixed(2)}</div>
  <div class="box">Jahr: CHF ${yearTotal.toFixed(2)}</div>
  <div class="box">Total: CHF ${totalTotal.toFixed(2)}</div>

  <div class="box">
    <div class="smallTitle">Top 5 Dienstleistungen</div>
    ${topServices.length ? topServices.map(s => `${s[0]} (${s[1]}x)`).join("<br>") : "Noch keine Daten"}
  </div>

  <div class="box">
    <div class="smallTitle">Top 10 Kundinnen</div>
    ${topCustomers.length ? topCustomers.map(c => `${c[0]} — CHF ${c[1].toFixed(2)}`).join("<br>") : "Noch keine Daten"}
  </div>

  <div class="box">
    <div class="smallTitle">Alle Einträge</div>
    ${data.length ? data.slice().reverse().map(entry => `
      <div style="margin-bottom:14px;">
        ${new Date(entry.date).toLocaleDateString()}<br>
        ${entry.name || "-"}<br>
        ${(entry.services || []).join(", ")}<br>
        CHF ${Number(entry.total || 0).toFixed(2)}
      </div>
    `).join("") : "Noch keine Daten"}
  </div>
`;
</script>

</body>
</html>
