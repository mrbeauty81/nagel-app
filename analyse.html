<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Analyse</title>

<link rel="apple-touch-icon" href="logo.PNG">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Analyse">

<style>
body{
font-family:-apple-system;
background:#0b0b0c;
color:white;
margin:0;
padding:15px;
}

.box{
background:#1c1c1f;
padding:15px;
border-radius:15px;
margin-top:10px;
}
</style>
</head>

<body>

<h1>Analyse 📊</h1>

<div id="out"></div>

<script>

let data=JSON.parse(localStorage.getItem("sales")||"[]");

let total=0;
let todayTotal=0;

let today=new Date().toDateString();

let services={};
let customers={};

data.forEach(d=>{

total+=d.total;

if(new Date(d.date).toDateString()===today){
todayTotal+=d.total;
}

d.services.forEach(s=>{
services[s]=(services[s]||0)+1;
});

customers[d.name]=(customers[d.name]||0)+d.total;

});

document.getElementById("out").innerHTML=`

<div class="box">Heute: CHF ${todayTotal.toFixed(2)}</div>
<div class="box">Total: CHF ${total.toFixed(2)}</div>

<div class="box">
<b>Top Dienstleistungen</b><br>
${Object.entries(services).map(s=>s[0]+" ("+s[1]+")").join("<br>")}
</div>

<div class="box">
<b>Top Kundinnen</b><br>
${Object.entries(customers).map(c=>c[0]+" CHF "+c[1].toFixed(2)).join("<br>")}
</div>

<div class="box">
<b>Alle Einträge</b><br>
${data.map(d=>`
${new Date(d.date).toLocaleDateString()}<br>
${d.name}<br>
${d.services.join(", ")}<br>
CHF ${d.total.toFixed(2)}<br><br>
`).join("")}
</div>

`;

</script>

</body>
</html>
