<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Analyse</title>

<style>
body{
font-family:-apple-system;
background:#0b0b0c;
color:white;
padding:15px;
}

.box{
background:#1c1c1f;
padding:15px;
border-radius:15px;
margin-top:10px;
}
</style>
</head>

<body>

<h1>Analyse 📊</h1>

<div id="out"></div>

<script>

let data=JSON.parse(localStorage.getItem("sales")||"[]");

console.log("DATA:",data); // 🔥 DEBUG

let total=0;
let todayTotal=0;

let today=new Date().toDateString();

let services={};
let customers={};

data.forEach(d=>{

total+=d.total;

if(new Date(d.date).toDateString()===today){
todayTotal+=d.total;
}

d.services.forEach(s=>{
services[s]=(services[s]||0)+1;
});

customers[d.name]=(customers[d.name]||0)+d.total;

});

let out=document.getElementById("out");

out.innerHTML=`
<div class="box">Heute: CHF ${todayTotal}</div>
<div class="box">Total: CHF ${total}</div>

<div class="box">
Top Services:<br>
${Object.entries(services).map(s=>s[0]+" "+s[1]).join("<br>")}
</div>

<div class="box">
Top Kunden:<br>
${Object.entries(customers).map(c=>c[0]+" CHF "+c[1]).join("<br>")}
</div>
`;

</script>

</body>
</html>
