<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyse</title>

<style>
body{font-family:-apple-system;background:#0b0b0c;color:white;padding:15px;}
.box{background:#1c1c1f;padding:15px;border-radius:15px;margin-top:10px;}
</style>
</head>

<body>

<h1>Analyse 📊</h1>
<div id="out"></div>

<script>

let data=JSON.parse(localStorage.getItem("sales")||"[]");

let today=new Date().toDateString();

let day=0, week=0, month=0, total=0;

let services={}, customers={};

data.forEach(d=>{

let date=new Date(d.date);

total+=d.total;

/* TAG */
if(date.toDateString()===today) day+=d.total;

/* WOCHE */
if((new Date()-date)/(1000*60*60*24)<=7) week+=d.total;

/* MONAT */
if(date.getMonth()===new Date().getMonth()) month+=d.total;

/* SERVICES */
d.services.forEach(s=>{
services[s]=(services[s]||0)+1;
});

/* KUNDEN */
customers[d.name]=(customers[d.name]||0)+d.total;

});

/* SORT */
let topS=Object.entries(services).sort((a,b)=>b[1]-a[1]).slice(0,5);
let topC=Object.entries(customers).sort((a,b)=>b[1]-a[1]).slice(0,10);

/* OUTPUT */
document.getElementById("out").innerHTML=`

<div class="box">Heute: CHF ${day.toFixed(2)}</div>
<div class="box">Woche: CHF ${week.toFixed(2)}</div>
<div class="box">Monat: CHF ${month.toFixed(2)}</div>
<div class="box">Total: CHF ${total.toFixed(2)}</div>

<div class="box">
<b>Top Dienstleistungen</b><br>
${topS.map(s=>s[0]+" ("+s[1]+"x)").join("<br>")}
</div>

<div class="box">
<b>Top Kundinnen</b><br>
${topC.map(c=>c[0]+" CHF "+c[1].toFixed(2)).join("<br>")}
</div>

<div class="box">
<b>Alle Einträge</b><br>
${data.map(d=>`
${new Date(d.date).toLocaleDateString()}<br>
${d.name}<br>
${d.services.join(", ")}<br>
CHF ${d.total.toFixed(2)}<br><br>
`).join("")}
</div>

`;

</script>

</body>
</html>
