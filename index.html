<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Kasse</title>

<link rel="apple-touch-icon" href="logo.PNG">

<style>
body{
font-family:-apple-system;
background:#000;
color:white;
margin:0;
overflow:hidden;
}

/* TOP */
.top{
position:fixed;
top:0;
left:0;
right:0;
background:#000;
padding:15px;
z-index:1000;
}

/* CONTENT */
.content{
position:absolute;
top:190px;
bottom:180px;
left:0;
right:0;
overflow-y:auto;
padding:15px;
}

/* BOTTOM */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
padding:20px;
}

/* HEADER */
.header{
position:relative;
height:50px;
margin-bottom:10px;
}

.title{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:22px;
font-weight:bold;
}

.logo{
position:absolute;
right:0;
top:50%;
transform:translateY(-50%);
width:45px;
}

/* NAME GRID */
.nameRow{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

/* INPUT */
.field{
width:100%;
height:56px;
padding:12px;
border-radius:12px;
border:none;
background:#1c1c1f;
color:white;
font-size:17px;
box-sizing:border-box;
}

/* ERROR */
.error{
border:2px solid #ff3b30 !important;
}

/* DROPDOWN */
.dropdown{
margin-top:10px;
height:56px;
display:flex;
align-items:center;
padding:12px;
background:#1c1c1f;
border-radius:12px;
color:#aaa;
}

.dropdown.active{
color:white;
}

.dropdown.error{
border:2px solid #ff3b30;
}

.dropdownList{
display:none;
margin-top:6px;
background:#1c1c1f;
border-radius:12px;
overflow:hidden;
}

.dropdownList div{
padding:14px;
border-bottom:1px solid #2a2a2a;
}

/* SERVICES */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.grid.error{
outline:2px solid #ff3b30;
border-radius:14px;
}

.btn{
background:#1c1c1f;
padding:14px;
border-radius:14px;
text-align:center;
white-space:pre-line;
}

.btn.active{
background:#007aff;
}

/* TOTAL */
.total{
background:white;
color:black;
padding:22px;
border-radius:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

/* BUTTON */
button{
width:100%;
padding:16px;
border-radius:14px;
border:none;
margin-top:12px;
background:#007aff;
color:white;
font-size:17px;
transition:0.3s;
}

button.success{
background:#34c759;
}
</style>
</head>

<body>

<div class="top">

<div class="header">
<div class="title">Kasse</div>
<img src="logo.PNG" class="logo">
</div>

<div class="nameRow">
<input id="vorname" class="field" placeholder="Vorname">
<input id="nachname" class="field" placeholder="Nachname">
</div>

<div id="dropdown" class="dropdown" onclick="toggleDropdown()">
<div id="selectedTarif">Tarif</div>
</div>

<div id="dropdownList" class="dropdownList">
<div onclick="selectTarif('Standard')">Standard</div>
<div onclick="selectTarif('Lehrling')">Lehrling</div>
</div>

</div>

<div class="content">
<div id="buttons" class="grid"></div>
</div>

<div class="bottom">
<div id="total" class="total">CHF 0.00</div>
<button id="copyBtn" onclick="copy()">Copy für Worldline</button>
</div>

<script>

let tarif=null;
let selected=[];
let copied=false;

/* RESET */
function resetErrors(){
document.getElementById("vorname").classList.remove("error");
document.getElementById("nachname").classList.remove("error");
document.getElementById("dropdown").classList.remove("error");
document.getElementById("buttons").classList.remove("error");
}

/* TARIF */
function toggleDropdown(){
let d=document.getElementById("dropdownList");
d.style.display=d.style.display==="block"?"none":"block";
}

function selectTarif(t){
tarif=t;
document.getElementById("selectedTarif").innerText=t;
document.getElementById("dropdownList").style.display="none";
document.getElementById("dropdown").classList.add("active");
render();
calc();
resetErrors();
}

/* DATEN */
const standard={
"Gel-Neumodellage mit Tips":65,
"Gel-Neumodellage Naturnagel":55,
"Auffüllen Natur":55,
"Farbe":10,
"French":10,
"Chrom":10,
"Reparatur pro Nagel":5,
"Entfernen Gel/Acryl":30,
"Augenbrauen zupfen":15,
"Augenbrauen färben":15,
"Wimpernlifting & färben":60,
"Wimpernverlängerung Volumen":90,
"Wimpern Volumen auffüllen":60,
"Wimpernverlängerung Natur":80,
"Wimpern Natur auffüllen":50,
"Wimpern entfernen":20
};

const lehrling={
"Gel-Neumodellage mit Tips":55,
"Gel-Neumodellage Naturnagel":45,
"Auffüllen Natur":45,
"Wimpernverlängerung Volumen":80,
"Wimpern Volumen auffüllen":50,
"Wimpernverlängerung Natur":70,
"Wimpern Natur auffüllen":50
};

function getPreise(){
if(tarif==="Lehrling") return {...standard,...lehrling};
return standard;
}

/* RENDER */
function render(){
let data=getPreise();
let c=document.getElementById("buttons");
c.innerHTML="";

Object.keys(data).forEach(name=>{
let d=document.createElement("div");
d.className="btn";

if(selected.includes(name)) d.classList.add("active");

d.innerText=name+"\nCHF "+data[name];

d.onclick=()=>{
selected.includes(name)?
selected=selected.filter(s=>s!==name):
selected.push(name);
render();
calc();
resetErrors();
};

c.appendChild(d);
});
}

/* TOTAL */
function calc(){
let data=getPreise();
let t=0;
selected.forEach(s=>t+=data[s]||0);
document.getElementById("total").innerText="CHF "+t.toFixed(2);
}

/* COPY */
function copy(){

if(copied) return;

resetErrors();

let vor=document.getElementById("vorname");
let nach=document.getElementById("nachname");
let dropdown=document.getElementById("dropdown");
let grid=document.getElementById("buttons");

let valid=true;

if(!vor.value.trim()){
vor.classList.add("error");
valid=false;
}

if(!nach.value.trim()){
nach.classList.add("error");
valid=false;
}

if(!tarif){
dropdown.classList.add("error");
valid=false;
}

if(selected.length===0){
grid.classList.add("error");
valid=false;
}

if(!valid) return;

/* SUCCESS */
navigator.clipboard.writeText("OK");

let btn=document.getElementById("copyBtn");
btn.classList.add("success");
btn.innerText="Kopiert ✓";
btn.disabled=true;

copied=true;
}

render();
calc();

</script>

</body>
</html>
