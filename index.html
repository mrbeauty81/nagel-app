<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Kasse</title>

<link rel="apple-touch-icon" href="logo.PNG">

<style>
body{
font-family:-apple-system;
background:#0b0b0c;
color:white;
margin:0;
overflow:hidden;
}

/* TOP */
.top{
position:fixed;
top:0;
left:0;
right:0;
background:#0b0b0c;
padding:15px;
z-index:1000;
}

/* BOTTOM */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:#0b0b0c;
padding:15px;
z-index:1000;
}

/* CONTENT */
.content{
position:absolute;
top:210px;
bottom:160px;
left:0;
right:0;
overflow-y:auto;
padding:15px;
}

/* HEADER */
.header{
position:relative;
height:50px;
margin-bottom:10px;
}

.title{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%, -50%);
font-size:22px;
font-weight:bold;
}

.logo{
position:absolute;
right:0;
top:50%;
transform:translateY(-50%);
width:45px;
height:45px;
}

/* 🔥 NAME ROW */
.nameRow{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px; /* 🔥 mehr Abstand */
margin-bottom:5px;
}

/* INPUT */
.field{
width:100%;
padding:10px 12px;
border-radius:12px;
border:none;
background:#1c1c1f;
color:white;
font-size:17px; /* 🔥 größer */
height:44px; /* 🔥 gleich wie Buttons */
box-sizing:border-box;
}

/* SELECT extra Abstand */
select.field{
margin-top:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

/* BUTTON */
.btn{
background:#1c1c1f;
padding:12px;
border-radius:14px;
text-align:center;
white-space:pre-line;
font-size:15px;
}

.btn.active{
background:#007aff;
}

/* TOTAL */
.total{
background:white;
color:black;
padding:20px;
border-radius:18px;
text-align:center;
font-size:26px;
font-weight:bold;
}

/* COPY */
button{
width:100%;
padding:14px;
border-radius:14px;
border:none;
margin-top:10px;
background:#007aff;
color:white;
font-size:16px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top">

<div class="header">
<div class="title">Kasse</div>
<img src="logo.PNG" class="logo">
</div>

<div class="nameRow">
<input id="vorname" class="field" placeholder="Vorname">
<input id="nachname" class="field" placeholder="Nachname">
</div>

<select id="tarif" class="field">
<option>Standard</option>
<option>Lehrling</option>
</select>

</div>

<!-- SCROLL -->
<div class="content">
<div id="buttons" class="grid"></div>
</div>

<!-- BOTTOM -->
<div class="bottom">
<div id="total" class="total">CHF 0.00</div>
<button onclick="copy()">Copy für Worldline</button>
</div>

<script>

// PREISE
const standard = {
"Gel-Neumodellage mit Tips":65,
"Gel-Neumodellage Naturnagel":55,
"Auffüllen Natur":55,
"Farbe":10,
"French":10,
"Chrom":10,
"Reparatur pro Nagel":5,
"Entfernen Gel/Acryl":30,
"Augenbrauen zupfen":15,
"Augenbrauen färben":15,
"Wimpernlifting & färben":60,
"Wimpernverlängerung Volumen":90,
"Wimpern Volumen auffüllen":60,
"Wimpernverlängerung Natur":80,
"Wimpern Natur auffüllen":50,
"Wimpern entfernen":20
};

const lehrling = {
"Gel-Neumodellage mit Tips":55,
"Gel-Neumodellage Naturnagel":45,
"Auffüllen Natur":45,
"Wimpernverlängerung Volumen":80,
"Wimpern Volumen auffüllen":50,
"Wimpernverlängerung Natur":70,
"Wimpern Natur auffüllen":50
};

// NUMMERN
const nummern = {
"Gel-Neumodellage mit Tips":1,
"Gel-Neumodellage Naturnagel":2,
"Auffüllen Natur":3,
"Farbe":4,
"French":5,
"Chrom":6,
"Reparatur pro Nagel":7,
"Entfernen Gel/Acryl":8,
"Augenbrauen zupfen":9,
"Augenbrauen färben":10,
"Wimpernlifting & färben":11,
"Wimpernverlängerung Volumen":12,
"Wimpern Volumen auffüllen":13,
"Wimpernverlängerung Natur":14,
"Wimpern Natur auffüllen":15,
"Wimpern entfernen":16
};

let selected=[];

function getPreise(){
let t=document.getElementById("tarif").value;
return t==="Standard"?standard:{...standard,...lehrling};
}

function render(){
let data=getPreise();
let c=document.getElementById("buttons");
c.innerHTML="";

Object.keys(data).forEach(name=>{
let d=document.createElement("div");

d.className="btn";
if(selected.includes(name)) d.classList.add("active");

d.innerText=name+"\nCHF "+data[name];

d.onclick=()=>{
selected.includes(name)?
selected=selected.filter(s=>s!==name):
selected.push(name);
render();
calc();
};

c.appendChild(d);
});
}

function calc(){
let data=getPreise();
let t=0;
selected.forEach(s=>t+=data[s]||0);
document.getElementById("total").innerText="CHF "+t.toFixed(2);
}

// SAVE
function saveSale(total){
let data=JSON.parse(localStorage.getItem("sales")||"[]");

data.push({
amount:total,
date:new Date().toISOString()
});

localStorage.setItem("sales",JSON.stringify(data));
}

// COPY
function copy(){

let vor=document.getElementById("vorname").value||"Kunde";
let nach=document.getElementById("nachname").value||"";

let name=`${vor} ${nach}`.trim();

let tarif=document.getElementById("tarif").value;
let tarifKurz=tarif==="Standard"?"S":"L";

let nums=selected.map(s=>nummern[s]).sort((a,b)=>a-b);

let text=`${name}, ${tarifKurz}, ${nums.join("+")}`;
text=text.substring(0,30);

navigator.clipboard.writeText(text);

// speichern
let total=0;
let data=getPreise();
selected.forEach(s=>total+=data[s]||0);

saveSale(total);
}

document.getElementById("tarif").onchange=()=>{render();calc();};

render();
calc();

</script>

</body>
</html>
