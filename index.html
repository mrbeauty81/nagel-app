<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nagel Studio</title>

<!-- iPhone App Feeling -->
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
body{font-family:-apple-system;background:#0b0b0c;color:white;padding:15px}
.field{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:none;background:#1c1c1f;color:white}
.service{background:#1c1c1f;padding:12px;border-radius:12px;margin:6px 0}
.total{background:white;color:black;padding:20px;border-radius:20px;text-align:center;margin-top:10px;font-size:28px;font-weight:bold}
button{width:100%;padding:14px;border-radius:12px;border:none;margin-top:10px}
.copy{background:#007aff;color:white}
.box{background:#1c1c1f;padding:15px;border-radius:15px;margin-top:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.btn{background:#1c1c1f;padding:12px;border-radius:12px;text-align:center;cursor:pointer}
.btn:hover{background:#2c2c2e}
h2{margin-top:20px}
</style>
</head>

<body>

<h2>Kasse 💅</h2>

<input id="kunde" class="field" placeholder="Kundenname">

<select id="tarif" class="field">
<option value="Standard">Standard</option>
<option value="Lehrling">Lehrling</option>
</select>

<!-- SERVICE BUTTONS -->
<div id="buttons" class="grid"></div>

<!-- AUSGEWÄHLTE SERVICES -->
<div id="services"></div>

<div class="total" id="total">CHF 0.00</div>

<button class="copy" onclick="copy()">Copy für Worldline</button>

<h2>Analyse 📊</h2>
<div id="analyse"></div>

<script>

// PREISE
const preise = {
Standard:{
"Gel-Neumodellage mit Tips":65,
"Gel-Neumodellage Naturnagel":55,
"Auffüllen Natur":55,
"Farbe":10,"French":10,"Chrom":10,
"Reparatur pro Nagel":5,
"Entfernen Gel/Acryl":30,
"Augenbrauen zupfen":15,
"Augenbrauen färben":15,
"Wimpernlifting & färben":60,
"Wimpernverlängerung Volumen":90,
"Wimpern Volumen auffüllen":60,
"Wimpernverlängerung Natur":80,
"Wimpern Natur auffüllen":50,
"Wimpern entfernen":20
},
Lehrling:{
"Gel-Neumodellage mit Tips":55,
"Gel-Neumodellage Naturnagel":45,
"Wimpernverlängerung Volumen":80,
"Wimpern Volumen auffüllen":50,
"Wimpernverlängerung Natur":70,
"Wimpern Natur auffüllen":50,
"Wimpern entfernen":20
}
};

let selected=[];

// BUTTONS GENERIEREN
function renderButtons(){
let tarif=document.getElementById("tarif").value;
let container=document.getElementById("buttons");
container.innerHTML="";

Object.keys(preise[tarif]).forEach(name=>{
let div=document.createElement("div");
div.className="btn";
div.innerText=name+" CHF "+preise[tarif][name];

div.onclick=()=>{
selected.push(name);
render();
calc();
};

container.appendChild(div);
});
}

// SERVICES ANZEIGE
function render(){
let c=document.getElementById("services");
c.innerHTML="";

let tarif=document.getElementById("tarif").value;

selected.forEach((s,i)=>{
let div=document.createElement("div");
div.className="service";
div.innerHTML=`
${s} - CHF ${preise[tarif][s]}
<span style="float:right;color:red;cursor:pointer" onclick="remove(${i})">✕</span>
`;
c.appendChild(div);
});
}

// REMOVE
function remove(i){
selected.splice(i,1);
render();
calc();
}

// CALC
function calc(){
let tarif=document.getElementById("tarif").value;
let total=0;

selected.forEach(s=>total+=preise[tarif][s]);

document.getElementById("total").innerText="CHF "+total.toFixed(2);
}

// COPY
function copy(){
let kunde=document.getElementById("kunde").value||"Ohne Name";
let tarif=document.getElementById("tarif").value;
let total=document.getElementById("total").innerText;

let text=`${kunde}, ${tarif}, ${selected.join(", ")}, ${total}`;
navigator.clipboard.writeText(text);

save(kunde,tarif);
}

// SAVE
function save(kunde,tarif){
let total=0;
selected.forEach(s=>total+=preise[tarif][s]);

let data=JSON.parse(localStorage.getItem("data")||"[]");

data.push({
kunde,tarif,services:[...selected],total,date:new Date().toISOString()
});

localStorage.setItem("data",JSON.stringify(data));

analyse();
}

// ANALYSE
function analyse(){
let data=JSON.parse(localStorage.getItem("data")||"[]");

let total=0,todayTotal=0,monthTotal=0;
let now=new Date();
let today=now.toDateString();

let count={};

data.forEach(d=>{
total+=d.total;
let dDate=new Date(d.date);

if(dDate.toDateString()===today) todayTotal+=d.total;
if(dDate.getMonth()===now.getMonth()) monthTotal+=d.total;

d.services.forEach(s=>{
count[s]=(count[s]||0)+1;
});
});

let top=Object.entries(count)
.sort((a,b)=>b[1]-a[1])
.slice(0,3)
.map(s=>`${s[0]} (${s[1]}x)`)
.join("<br>");

document.getElementById("analyse").innerHTML=`
<div class="box">Heute: CHF ${todayTotal.toFixed(2)}</div>
<div class="box">Monat: CHF ${monthTotal.toFixed(2)}</div>
<div class="box">Total: CHF ${total.toFixed(2)}</div>
<div class="box">Kunden: ${data.length}</div>
<div class="box">Top Services:<br>${top||"Keine Daten"}</div>
`;
}

// TARIF CHANGE
document.getElementById("tarif").onchange=()=>{
selected=[];
render();
calc();
renderButtons();
};

// INIT
renderButtons();
render();
calc();
analyse();

</script>

</body>
</html>
