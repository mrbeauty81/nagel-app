<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Kasse</title>

<link rel="apple-touch-icon" href="logo.PNG">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MR BEAUTY">

<style>
body{
font-family:-apple-system;
background:#0b0b0c;
color:white;
margin:0;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

.title{
font-size:22px;
font-weight:bold;
}

.logo{
width:45px;
}

/* INPUT */
.row{
display:flex;
gap:10px;
padding:0 15px;
}

input, select{
flex:1;
padding:12px;
border-radius:12px;
border:none;
background:#1c1c1f;
color:white;
margin-top:10px;
font-size:16px;
}

/* SERVICES */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:15px;
}

.btn{
background:#1c1c1f;
padding:14px;
border-radius:14px;
text-align:center;
}

.btn.active{
background:#007aff;
}

/* BOTTOM */
.bottom{
position:sticky;
bottom:0;
background:#0b0b0c;
padding:15px;
}

.total{
background:white;
color:black;
padding:20px;
border-radius:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

button{
width:100%;
margin-top:10px;
padding:14px;
border:none;
border-radius:14px;
background:#007aff;
color:white;
font-size:16px;
}

button.success{
background:#34c759;
}
</style>
</head>

<body>

<div class="header">
<div class="title">Kasse</div>
<img src="logo.PNG" class="logo">
</div>

<div class="row">
<input id="vorname" placeholder="Vorname">
<input id="nachname" placeholder="Nachname">
</div>

<div class="row">
<select id="tarif">
<option value="">Tarif wählen</option>
<option value="Standard">Standard</option>
<option value="Lehrling">Lehrling</option>
</select>
</div>

<div id="services" class="grid"></div>

<div class="bottom">
<div id="total" class="total">CHF 0.00</div>
<button id="copyBtn" onclick="copy()">Copy</button>
</div>

<script>

const services={
"Farbe":10,
"French":10,
"Chrom":10,
"Augenbrauen zupfen":15,
"Augenbrauen färben":15
};

let selected=[];

function render(){
let c=document.getElementById("services");
c.innerHTML="";

Object.keys(services).forEach(s=>{
let d=document.createElement("div");

d.className="btn";
if(selected.includes(s)) d.classList.add("active");

d.innerText=s+"\nCHF "+services[s];

d.onclick=()=>{
selected.includes(s)?
selected=selected.filter(x=>x!==s):
selected.push(s);

render();
calc();
resetCopy();
};

c.appendChild(d);
});
}

function calc(){
let t=0;
selected.forEach(s=>t+=services[s]);
document.getElementById("total").innerText="CHF "+t.toFixed(2);
}

function resetCopy(){
let btn=document.getElementById("copyBtn");
btn.classList.remove("success");
btn.innerText="Copy";
btn.disabled=false;
}

function copy(){

let vor=document.getElementById("vorname").value.trim();
let nach=document.getElementById("nachname").value.trim();
let tarif=document.getElementById("tarif").value;

if(!vor||!nach||!tarif||selected.length===0){
alert("Bitte alles ausfüllen");
return;
}

let total=0;
selected.forEach(s=>total+=services[s]);

/* SPEICHERN */
let data=JSON.parse(localStorage.getItem("sales")||"[]");

data.push({
name:vor+" "+nach,
tarif:tarif,
services:[...selected],
total:total,
date:new Date().toISOString()
});

localStorage.setItem("sales",JSON.stringify(data));

/* COPY FEEDBACK */
let btn=document.getElementById("copyBtn");
btn.classList.add("success");
btn.innerText="Kopiert ✓";
btn.disabled=true;
}

render();
calc();

</script>

</body>
</html>
