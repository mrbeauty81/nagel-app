<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>MR BEAUTY</title>

<link rel="apple-touch-icon" href="logo.PNG">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MR BEAUTY">

<style>
body{
font-family:-apple-system;
background:#0f0e0c; /* dunkles gold */
color:white;
margin:0;
overflow:hidden;
}

/* TOP */
.top{
position:fixed;
top:0;
left:0;
right:0;
background:#0f0e0c;
padding:15px;
z-index:1000;
}

/* CONTENT */
.content{
position:absolute;
top:180px; /* mehr Platz */
bottom:180px;
left:0;
right:0;
overflow-y:auto;
padding:15px;
-webkit-overflow-scrolling:touch;
}

/* BOTTOM */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:#0f0e0c;
padding:20px;
}

/* HEADER */
.header{
position:relative;
height:50px;
margin-bottom:10px;
}

.title{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:22px;
font-weight:bold;
}

.logo{
position:absolute;
right:0;
top:50%;
transform:translateY(-50%);
width:45px;
}

/* NAME */
.nameRow{
display:flex;
gap:10px;
margin-top:10px;
}

.field{
flex:1;
padding:12px;
border-radius:12px;
border:none;
background:#1f1d19;
color:white;
font-size:16px;
box-sizing:border-box;
}

/* DROPDOWN */
.dropdown{
margin-top:10px;
padding:12px;
background:#1f1d19;
border-radius:12px;
color:#aaa;
}

.dropdown.active{
color:white;
}

.dropdownList{
display:none;
margin-top:6px;
background:#1f1d19;
border-radius:12px;
overflow:hidden;
}

.dropdownList div{
padding:14px;
border-bottom:1px solid #2a2925;
}

/* SERVICES */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.btn{
background:#1f1d19;
padding:14px;
border-radius:14px;
text-align:center;
white-space:pre-line;
}

.btn.active{
background:#007aff;
}

/* TOTAL */
.total{
background:white;
color:black;
padding:20px;
border-radius:18px;
text-align:center;
font-size:26px;
font-weight:bold;
}

/* BUTTON */
button{
width:100%;
padding:14px;
border-radius:14px;
border:none;
margin-top:10px;
background:#007aff;
color:white;
font-size:16px;
}

button.green{
background:#6fa94d; /* gold-grün */
}
</style>
</head>

<body>

<!-- KASSE -->
<div id="kasse">

<div class="top">
<div class="header">
<div class="title">Kasse</div>
<img src="logo.PNG" class="logo">
</div>

<div class="nameRow">
<input id="vorname" class="field" placeholder="Vorname">
<input id="nachname" class="field" placeholder="Nachname">
</div>

<div id="dropdown" class="dropdown" onclick="toggleDropdown()">
<div id="selectedTarif">Tarif</div>
</div>

<div id="dropdownList" class="dropdownList">
<div onclick="selectTarif('Standard')">Standard</div>
<div onclick="selectTarif('Lehrling')">Lehrling</div>
</div>

</div>

<div class="content">
<div id="buttons" class="grid"></div>
</div>

<div class="bottom">
<div id="total" class="total">CHF 0.00</div>
<button onclick="copy()">Copy</button>
<button class="green" onclick="showAnalyse()">Analyse</button>
</div>

</div>

<!-- ANALYSE -->
<div id="analyse" style="display:none; padding:15px; height:100vh; overflow-y:auto; background:#0f0e0c;">
<h2 style="text-align:center;">Analyse 📊</h2>
<div id="analyseContent"></div>
<button onclick="showKasse()">← Kasse</button>
</div>

<script>

let tarif=null;
let selected=[];

/* TARIF */
function toggleDropdown(){
let d=document.getElementById("dropdownList");
d.style.display=d.style.display==="block"?"none":"block";
}

function selectTarif(t){
tarif=t;
document.getElementById("selectedTarif").innerText=t;
document.getElementById("dropdownList").style.display="none";
render();
calc();
}

/* DATEN */
const standard={
"Gel-Neumodellage mit Tips":65,
"Gel-Neumodellage Naturnagel":55,
"Auffüllen Natur":55,
"Farbe":10,
"French":10,
"Chrom":10,
"Reparatur pro Nagel":5,
"Entfernen Gel/Acryl":30,
"Augenbrauen zupfen":15,
"Augenbrauen färben":15,
"Wimpernlifting & färben":60,
"Wimpernverlängerung Volumen":90,
"Wimpern Volumen auffüllen":60,
"Wimpernverlängerung Natur":80,
"Wimpern Natur auffüllen":50,
"Wimpern entfernen":20
};

const lehrling={
"Gel-Neumodellage mit Tips":55,
"Gel-Neumodellage Naturnagel":45,
"Auffüllen Natur":45,
"Wimpernverlängerung Volumen":80,
"Wimpern Volumen auffüllen":50,
"Wimpernverlängerung Natur":70,
"Wimpern Natur auffüllen":50
};

function getPreise(){
if(tarif==="Lehrling") return {...standard,...lehrling};
return standard;
}

/* RENDER */
function render(){
let data=getPreise();
let c=document.getElementById("buttons");
c.innerHTML="";

Object.keys(data).forEach(name=>{
let d=document.createElement("div");

d.className="btn";
if(selected.includes(name)) d.classList.add("active");

d.innerText=name+"\nCHF "+data[name];

d.onclick=()=>{
selected.includes(name)?
selected=selected.filter(s=>s!==name):
selected.push(name);
render();
calc();
};

c.appendChild(d);
});
}

/* TOTAL */
function calc(){
let data=getPreise();
let t=0;
selected.forEach(s=>t+=data[s]||0);
document.getElementById("total").innerText="CHF "+t.toFixed(2);
}

/* COPY */
function copy(){
if(!tarif||selected.length===0){
alert("Alles auswählen");
return;
}

let total=0;
let data=getPreise();
selected.forEach(s=>total+=data[s]);

let arr=JSON.parse(localStorage.getItem("sales")||"[]");

arr.push({
services:selected,
total,
date:new Date().toISOString()
});

localStorage.setItem("sales",JSON.stringify(arr));

alert("Gespeichert ✓");
}

/* SWITCH */
function showAnalyse(){
document.getElementById("kasse").style.display="none";
document.getElementById("analyse").style.display="block";
loadAnalyse();
}

function showKasse(){
document.getElementById("analyse").style.display="none";
document.getElementById("kasse").style.display="block";
}

/* ANALYSE */
function loadAnalyse(){
let data=JSON.parse(localStorage.getItem("sales")||"[]");
let total=0;
data.forEach(d=>total+=d.total);

document.getElementById("analyseContent").innerHTML=
`<div style="background:#1f1d19;padding:15px;border-radius:15px;">
Total: CHF ${total.toFixed(2)}
</div>`;
}

render();
calc();

</script>

</body>
</html>
