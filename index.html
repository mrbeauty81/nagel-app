<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Kasse</title>

<link rel="apple-touch-icon" href="logo.PNG">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kasse">

<style>
body{
  font-family:-apple-system;
  background:#000;
  color:white;
  margin:0;
  overflow:hidden;
}

.top{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#000;
  padding:15px;
  z-index:1000;
}

.content{
  position:absolute;
  top:185px;
  bottom:170px;
  left:0;
  right:0;
  overflow-y:auto;
  padding:15px;
}

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#000;
  padding:15px;
}

.header{
  position:relative;
  height:50px;
  margin-bottom:10px;
}

.title{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:22px;
  font-weight:bold;
}

.logo{
  position:absolute;
  right:0;
  top:50%;
  transform:translateY(-50%);
  width:45px;
}

.nameRow{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.field,
.dropdown{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#1c1c1f;
  color:white;
  font-size:17px;
  height:46px;
  box-sizing:border-box;
}

.dropdown{
  margin-top:10px;
  display:flex;
  align-items:center;
  color:#aaa;
}

.dropdown.active{
  color:white;
}

.dropdownList{
  display:none;
  margin-top:6px;
  background:#1c1c1f;
  border-radius:12px;
  overflow:hidden;
}

.dropdownList div{
  padding:14px;
  border-bottom:1px solid #2a2a2a;
}

.dropdownList div:last-child{
  border-bottom:none;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.btn{
  background:#1c1c1f;
  padding:10px;
  border-radius:14px;
  text-align:center;
  white-space:pre-line;
  min-height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
  line-height:1.35;
  box-sizing:border-box;
}

.btn.active{
  background:#007aff;
}

.total{
  background:white;
  color:black;
  padding:18px;
  border-radius:18px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:#007aff;
  color:white;
  font-size:17px;
}

button.success{
  background:#34c759;
}

.error{
  border:2px solid #ff3b30 !important;
}

.grid.error .btn{
  border:2px solid #ff3b30;
}
</style>
</head>

<body>

<div class="top">
  <div class="header">
    <div class="title">Kasse</div>
    <img src="logo.PNG" class="logo">
  </div>

  <div class="nameRow">
    <input id="vorname" class="field" placeholder="Vorname" oninput="resetState()">
    <input id="nachname" class="field" placeholder="Nachname" oninput="resetState()">
  </div>

  <div id="dropdown" class="dropdown" onclick="toggleDropdown()">
    <div id="selectedTarif">Tarif</div>
  </div>

  <div id="dropdownList" class="dropdownList">
    <div onclick="selectTarif('Standard')">Standard</div>
    <div onclick="selectTarif('Lehrling')">Lehrling</div>
  </div>
</div>

<div class="content">
  <div id="buttons" class="grid"></div>
</div>

<div class="bottom">
  <div id="total" class="total">CHF 0.00</div>
  <button id="copyBtn" onclick="copy()">Copy für Worldline</button>
</div>

<script>
let tarif = null;
let selected = [];
let copied = false;

/* STANDARD 1-16 */
const standardServices = {
  "Gel-Neumodellage mit Tips": { price: 65, nr: 1 },
  "Gel-Neumodellage Naturnagel": { price: 55, nr: 2 },
  "Auffüllen Natur": { price: 55, nr: 3 },
  "Farbe": { price: 10, nr: 4 },
  "French": { price: 10, nr: 5 },
  "Chrom": { price: 10, nr: 6 },
  "Reparatur pro Nagel": { price: 5, nr: 7 },
  "Entfernen Gel/Acryl": { price: 30, nr: 8 },
  "Augenbrauen zupfen": { price: 15, nr: 9 },
  "Augenbrauen färben": { price: 15, nr: 10 },
  "Wimpernlifting & färben": { price: 60, nr: 11 },
  "Wimpernverlängerung Volumen": { price: 90, nr: 12 },
  "Wimpern Volumen auffüllen": { price: 60, nr: 13 },
  "Wimpernverlängerung Natur": { price: 80, nr: 14 },
  "Wimpern Natur auffüllen": { price: 50, nr: 15 },
  "Wimpern entfernen": { price: 20, nr: 16 }
};

/* LEHRLING 17-24 */
const lehrlingNumbers = {
  "Gel-Neumodellage mit Tips": { price: 55, nr: 17 },
  "Gel-Neumodellage Naturnagel": { price: 45, nr: 18 },
  "Auffüllen Natur": { price: 45, nr: 19 },
  "Wimpernverlängerung Volumen": { price: 80, nr: 20 },
  "Wimpern Volumen auffüllen": { price: 50, nr: 21 },
  "Wimpernverlängerung Natur": { price: 70, nr: 22 },
  "Wimpern Natur auffüllen": { price: 50, nr: 23 },
  "Wimpern entfernen": { price: 20, nr: 24 }
};

function toggleDropdown(){
  const d = document.getElementById("dropdownList");
  d.style.display = d.style.display === "block" ? "none" : "block";
}

function selectTarif(t){
  tarif = t;
  document.getElementById("selectedTarif").innerText = t;
  document.getElementById("dropdown").classList.add("active");
  document.getElementById("dropdownList").style.display = "none";
  resetState();
  render();
  calc();
}

function getRenderedServices(){
  const result = {};

  Object.keys(standardServices).forEach(name => {
    let price = standardServices[name].price;

    if (tarif === "Lehrling" && lehrlingNumbers[name]) {
      price = lehrlingNumbers[name].price;
    }

    result[name] = { price };
  });

  return result;
}

function getCopyNumber(name){
  if (tarif === "Lehrling" && lehrlingNumbers[name]) {
    return lehrlingNumbers[name].nr;
  }
  return standardServices[name].nr;
}

function resetState(){
  document.getElementById("vorname").classList.remove("error");
  document.getElementById("nachname").classList.remove("error");
  document.getElementById("dropdown").classList.remove("error");
  document.getElementById("buttons").classList.remove("error");

  if(copied){
    const btn = document.getElementById("copyBtn");
    btn.innerText = "Copy für Worldline";
    btn.classList.remove("success");
    copied = false;
  }
}

function render(){
  const data = getRenderedServices();
  const c = document.getElementById("buttons");
  c.innerHTML = "";

  Object.keys(data).forEach(name => {
    const d = document.createElement("div");
    d.className = "btn";
    if(selected.includes(name)) d.classList.add("active");

    d.innerText = name + "\nCHF " + data[name].price;

    d.onclick = () => {
      selected.includes(name)
        ? selected = selected.filter(s => s !== name)
        : selected.push(name);

      render();
      calc();
      resetState();
    };

    c.appendChild(d);
  });
}

function calc(){
  const data = getRenderedServices();
  let t = 0;
  selected.forEach(s => t += data[s]?.price || 0);
  document.getElementById("total").innerText = "CHF " + t.toFixed(2);
}

function copy(){
  const vor = document.getElementById("vorname");
  const nach = document.getElementById("nachname");
  const drop = document.getElementById("dropdown");
  const grid = document.getElementById("buttons");

  let valid = true;

  if(!vor.value.trim()){
    vor.classList.add("error");
    valid = false;
  }
  if(!nach.value.trim()){
    nach.classList.add("error");
    valid = false;
  }
  if(!tarif){
    drop.classList.add("error");
    valid = false;
  }
  if(selected.length === 0){
    grid.classList.add("error");
    valid = false;
  }

  if(!valid) return;

  const name = `${vor.value.trim()} ${nach.value.trim()}`;
  const tarifKurz = tarif === "Standard" ? "S" : "L";
  const nums = selected.map(getCopyNumber).sort((a,b)=>a-b);

  const text = `${name}, ${tarifKurz}, ${nums.join("+")}`;
  navigator.clipboard.writeText(text);

  const btn = document.getElementById("copyBtn");
  btn.innerText = "Kopiert ✓";
  btn.classList.add("success");
  copied = true;
}

render();
calc();
</script>

</body>
</html>
