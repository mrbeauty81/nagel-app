<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Kasse</title>

<link rel="apple-touch-icon" href="logo.PNG">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kasse">

<style>
body{font-family:-apple-system;background:#0b0b0c;color:white;margin:0;overflow:hidden;}
.top{position:fixed;top:0;left:0;right:0;background:#0b0b0c;padding:15px;z-index:1000;}
.content{position:absolute;top:170px;bottom:170px;left:0;right:0;overflow-y:auto;padding:15px;}
.bottom{position:fixed;bottom:0;left:0;right:0;background:#0b0b0c;padding:20px 20px 26px 20px;}

.header{position:relative;height:50px;margin-bottom:10px;}
.title{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:bold;}
.logo{position:absolute;right:0;top:50%;transform:translateY(-50%);width:45px;}

.nameRow{display:flex;gap:10px;margin-top:10px;}
.nameRow .field{flex:1;}

.field{width:100%;padding:12px;border-radius:12px;border:none;background:#1c1c1f;color:white;font-size:17px;height:46px;}

.dropdown{margin-top:10px;padding:12px;background:#1c1c1f;border-radius:12px;color:#aaa;}
.dropdown.active{color:white;}

.dropdownList{display:none;margin-top:6px;background:#1c1c1f;border-radius:12px;}
.dropdownList div{padding:14px;border-bottom:1px solid #2a2a2a;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{background:#1c1c1f;padding:12px;border-radius:14px;text-align:center;}
.btn.active{background:#007aff;}

.total{background:white;color:black;padding:20px;border-radius:18px;text-align:center;font-size:26px;font-weight:bold;}

button{width:100%;padding:12px;border-radius:14px;border:none;margin-top:10px;background:#007aff;color:white;font-size:16px;}
button.success{background:#34c759;}
button:disabled{opacity:0.6;}
</style>
</head>

<body>

<div class="top">
<div class="header">
<div class="title">Kasse</div>
<img src="logo.PNG" class="logo">
</div>

<div class="nameRow">
<input id="vorname" class="field" placeholder="Vorname" oninput="resetCopy()">
<input id="nachname" class="field" placeholder="Nachname" oninput="resetCopy()">
</div>

<div id="dropdown" class="dropdown" onclick="toggleDropdown()">
<div id="selectedTarif">Tarif</div>
</div>

<div id="dropdownList" class="dropdownList">
<div onclick="selectTarif('Standard')">Standard</div>
<div onclick="selectTarif('Lehrling')">Lehrling</div>
</div>
</div>

<div class="content">
<div id="buttons" class="grid"></div>
</div>

<div class="bottom">
<div id="total" class="total">CHF 0.00</div>
<button id="copyBtn" onclick="copy()">Copy</button>
</div>

<script>

let tarif=null;
let selected=[];
let copied=false;

/* RESET */
function resetCopy(){
if(copied){
let btn=document.getElementById("copyBtn");
btn.disabled=false;
btn.classList.remove("success");
btn.innerText="Copy";
copied=false;
}
}

/* DROPDOWN */
function toggleDropdown(){
let d=document.getElementById("dropdownList");
d.style.display=d.style.display==="block"?"none":"block";
}

function selectTarif(t){
tarif=t;
document.getElementById("selectedTarif").innerText=t;
document.getElementById("dropdownList").style.display="none";
document.getElementById("dropdown").classList.add("active");
render();calc();resetCopy();
}

/* PREISE */
const preise={
"Gel-Neumodellage":65,
"Auffüllen Natur":55,
"Farbe":10,
"French":10,
"Chrom":10,
"Augenbrauen zupfen":15,
"Augenbrauen färben":15
};

/* RENDER */
function render(){
let c=document.getElementById("buttons");
c.innerHTML="";
Object.keys(preise).forEach(name=>{
let d=document.createElement("div");
d.className="btn";
if(selected.includes(name)) d.classList.add("active");

d.innerText=name+"\nCHF "+preise[name];

d.onclick=()=>{
selected.includes(name)?
selected=selected.filter(s=>s!==name):
selected.push(name);

render();calc();resetCopy();
};

c.appendChild(d);
});
}

/* TOTAL */
function calc(){
let t=0;
selected.forEach(s=>t+=preise[s]);
document.getElementById("total").innerText="CHF "+t.toFixed(2);
}

/* COPY + SPEICHERN */
function copy(){

let vor=document.getElementById("vorname").value.trim();
let nach=document.getElementById("nachname").value.trim();

if(!vor||!nach||!tarif||selected.length===0){
alert("Bitte alles ausfüllen");
return;
}

let total=0;
selected.forEach(s=>total+=preise[s]);

/* 🔥 NUR HIER SPEICHERN */
let data=JSON.parse(localStorage.getItem("sales")||"[]");

data.push({
name:vor+" "+nach,
services:[...selected],
total,
date:new Date().toISOString()
});

localStorage.setItem("sales",JSON.stringify(data));

/* COPY */
navigator.clipboard.writeText(vor+" "+nach);

/* LOCK BUTTON */
let btn=document.getElementById("copyBtn");
btn.classList.add("success");
btn.innerText="Kopiert ✓";
btn.disabled=true;
copied=true;
}

render();calc();

</script>

</body>
</html>
