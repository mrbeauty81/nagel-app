<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kasse</title>

<style>
body{
font-family:-apple-system;
background:#0b0b0c;
color:white;
margin:0;
}

/* TOP */
.top{
padding:15px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:22px;
font-weight:bold;
}

.logo{
width:45px;
}

/* INPUTS */
.nameRow{
display:flex;
gap:10px;
margin-top:10px;
}

.field{
flex:1;
padding:12px;
border-radius:12px;
border:none;
background:#1c1c1f;
color:white;
}

/* DROPDOWN */
.dropdown{
margin-top:10px;
padding:12px;
background:#1c1c1f;
border-radius:12px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:15px;
}

.btn{
background:#1c1c1f;
padding:12px;
border-radius:14px;
text-align:center;
}

.btn.active{
background:#007aff;
}

/* BOTTOM */
.bottom{
position:sticky;
bottom:0;
background:#0b0b0c;
padding:15px;
}

.total{
background:white;
color:black;
padding:18px;
border-radius:18px;
text-align:center;
font-size:24px;
}

button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:14px;
background:#007aff;
color:white;
}

button.success{
background:#34c759;
}
</style>
</head>

<body>

<div class="top">

<div class="header">
<div class="title">Kasse</div>
<img src="logo.PNG" class="logo">
</div>

<div class="nameRow">
<input id="vorname" class="field" placeholder="Vorname">
<input id="nachname" class="field" placeholder="Nachname">
</div>

<div class="dropdown" id="tarif">Tarif: Standard</div>

</div>

<div id="buttons" class="grid"></div>

<div class="bottom">
<div id="total" class="total">CHF 0.00</div>
<button id="copyBtn" onclick="copy()">Copy</button>
</div>

<script>

let selected=[];

const preise={
"Farbe":10,
"French":10,
"Chrom":10,
"Augenbrauen zupfen":15,
"Augenbrauen färben":15
};

function render(){
let c=document.getElementById("buttons");
c.innerHTML="";

Object.keys(preise).forEach(name=>{
let d=document.createElement("div");
d.className="btn";

if(selected.includes(name)) d.classList.add("active");

d.innerText=name+"\nCHF "+preise[name];

d.onclick=()=>{
selected.includes(name)?
selected=selected.filter(s=>s!==name):
selected.push(name);

render();calc();
};

c.appendChild(d);
});
}

function calc(){
let t=0;
selected.forEach(s=>t+=preise[s]);
document.getElementById("total").innerText="CHF "+t.toFixed(2);
}

function copy(){

let vor=document.getElementById("vorname").value;
let nach=document.getElementById("nachname").value;

if(!vor||!nach||selected.length===0){
alert("Bitte alles ausfüllen");
return;
}

let total=0;
selected.forEach(s=>total+=preise[s]);

/* SPEICHERN */
let data=JSON.parse(localStorage.getItem("sales")||"[]");

data.push({
name:vor+" "+nach,
services:[...selected],
total,
date:new Date().toISOString()
});

localStorage.setItem("sales",JSON.stringify(data));

/* UI */
let btn=document.getElementById("copyBtn");
btn.classList.add("success");
btn.innerText="Kopiert ✓";
btn.disabled=true;
}

render();
calc();

</script>

</body>
</html>
