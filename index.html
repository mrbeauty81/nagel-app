<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>MR BEAUTY</title>

<link rel="apple-touch-icon" href="logo.PNG">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MR BEAUTY">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body{
  font-family:-apple-system;
  background:#0b0b0c;
  color:white;
  margin:0;
  overflow:hidden;
}

/* KASSE */
.top{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#0b0b0c;
  padding:15px;
  z-index:1000;
}

.content{
  position:absolute;
  top:170px;
  bottom:170px;
  left:0;
  right:0;
  overflow-y:auto;
  padding:15px;
  -webkit-overflow-scrolling:touch;
}

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#0b0b0c;
  padding:20px;
}

.header{
  position:relative;
  height:50px;
  margin-bottom:10px;
}

.title{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:22px;
  font-weight:bold;
}

.logo{
  position:absolute;
  right:0;
  top:50%;
  transform:translateY(-50%);
  width:45px;
}

.nameRow{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.field{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#1c1c1f;
  color:white;
  font-size:16px;
  box-sizing:border-box;
}

.dropdown{
  margin-top:10px;
  padding:12px;
  background:#1c1c1f;
  border-radius:12px;
  color:#aaa;
}

.dropdown.active{
  color:white;
}

.dropdownList{
  display:none;
  margin-top:6px;
  background:#1c1c1f;
  border-radius:12px;
  overflow:hidden;
}

.dropdownList div{
  padding:14px;
  border-bottom:1px solid #2a2a2a;
}

.dropdownList div:last-child{
  border:none;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  align-content:start;
}

.btn{
  background:#1c1c1f;
  padding:12px;
  border-radius:14px;
  text-align:center;
  white-space:pre-line;
  user-select:none;
}

.btn.active{
  background:#007aff;
}

.total{
  background:white;
  color:black;
  padding:20px;
  border-radius:18px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
}

button{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  margin-top:10px;
  background:#007aff;
  color:white;
  font-size:16px;
}

button.green{
  background:#34c759;
}

button.success{
  background:#34c759;
}

button:disabled{
  opacity:0.75;
}

/* ANALYSE */
#analyse{
  display:none;
  height:100vh;
  overflow:hidden;
  background:#0b0b0c;
}

.analyseTop{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#0b0b0c;
  padding:15px;
  z-index:1000;
}

.analyseTitle{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin:0;
}

.analyseContent{
  position:absolute;
  top:80px;
  bottom:80px;
  left:0;
  right:0;
  overflow-y:auto;
  padding:15px;
  -webkit-overflow-scrolling:touch;
}

.analyseBottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#0b0b0c;
  padding:15px;
}

.box{
  background:#1c1c1f;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

.smallTitle{
  font-weight:bold;
  margin-bottom:8px;
}
</style>
</head>

<body>

<!-- KASSE -->
<div id="kasse">

  <div class="top">
    <div class="header">
      <div class="title">Kasse</div>
      <img src="logo.PNG" class="logo">
    </div>

    <div class="nameRow">
      <input id="vorname" class="field" placeholder="Vorname" oninput="resetCopy()">
      <input id="nachname" class="field" placeholder="Nachname" oninput="resetCopy()">
    </div>

    <div id="dropdown" class="dropdown" onclick="toggleDropdown()">
      <div id="selectedTarif">Tarif</div>
    </div>

    <div id="dropdownList" class="dropdownList">
      <div onclick="selectTarif('Standard')">Standard</div>
      <div onclick="selectTarif('Lehrling')">Lehrling</div>
    </div>
  </div>

  <div class="content">
    <div id="buttons" class="grid"></div>
  </div>

  <div class="bottom">
    <div id="total" class="total">CHF 0.00</div>
    <button id="copyBtn" onclick="copy()">Copy</button>
    <button class="green" onclick="showAnalyse()">Analyse</button>
  </div>
</div>

<!-- ANALYSE -->
<div id="analyse">
  <div class="analyseTop">
    <h2 class="analyseTitle">Analyse 📊</h2>
  </div>

  <div class="analyseContent" id="analyseContent"></div>

  <div class="analyseBottom">
    <button onclick="showKasse()">Kasse</button>
  </div>
</div>

<script>
let tarif = null;
let selected = [];
let copied = false;

/* PREISE */
const standard = {
  "Gel-Neumodellage mit Tips":65,
  "Gel-Neumodellage Naturnagel":55,
  "Auffüllen Natur":55,
  "Farbe":10,
  "French":10,
  "Chrom":10,
  "Reparatur pro Nagel":5,
  "Entfernen Gel/Acryl":30,
  "Augenbrauen zupfen":15,
  "Augenbrauen färben":15,
  "Wimpernlifting & färben":60,
  "Wimpernverlängerung Volumen":90,
  "Wimpern Volumen auffüllen":60,
  "Wimpernverlängerung Natur":80,
  "Wimpern Natur auffüllen":50,
  "Wimpern entfernen":20
};

const lehrling = {
  "Gel-Neumodellage mit Tips":55,
  "Gel-Neumodellage Naturnagel":45,
  "Auffüllen Natur":45,
  "Wimpernverlängerung Volumen":80,
  "Wimpern Volumen auffüllen":50,
  "Wimpernverlängerung Natur":70,
  "Wimpern Natur auffüllen":50
};

/* WORLDLINE NUMMERN */
const nummern = {
  "Gel-Neumodellage mit Tips":1,
  "Gel-Neumodellage Naturnagel":2,
  "Auffüllen Natur":3,
  "Farbe":4,
  "French":5,
  "Chrom":6,
  "Reparatur pro Nagel":7,
  "Entfernen Gel/Acryl":8,
  "Augenbrauen zupfen":9,
  "Augenbrauen färben":10,
  "Wimpernlifting & färben":11,
  "Wimpernverlängerung Volumen":12,
  "Wimpern Volumen auffüllen":13,
  "Wimpernverlängerung Natur":14,
  "Wimpern Natur auffüllen":15,
  "Wimpern entfernen":16
};

function resetCopy(){
  if(copied){
    let btn = document.getElementById("copyBtn");
    btn.disabled = false;
    btn.classList.remove("success");
    btn.innerText = "Copy";
    copied = false;
  }
}

function toggleDropdown(){
  let d = document.getElementById("dropdownList");
  d.style.display = d.style.display === "block" ? "none" : "block";
}

function selectTarif(t){
  tarif = t;
  document.getElementById("selectedTarif").innerText = t;
  document.getElementById("dropdown").classList.add("active");
  document.getElementById("dropdownList").style.display = "none";
  render();
  calc();
  resetCopy();
}

function getPreise(){
  if(tarif === "Lehrling"){
    return {...standard, ...lehrling};
  }
  return standard;
}

function render(){
  const data = getPreise();
  const c = document.getElementById("buttons");
  c.innerHTML = "";

  Object.keys(data).forEach(name => {
    let d = document.createElement("div");
    d.className = "btn";
    if(selected.includes(name)) d.classList.add("active");

    d.innerText = name + "\nCHF " + data[name];

    d.onclick = () => {
      if(selected.includes(name)){
        selected = selected.filter(s => s !== name);
      } else {
        selected.push(name);
      }
      render();
      calc();
      resetCopy();
    };

    c.appendChild(d);
  });
}

function calc(){
  const data = getPreise();
  let t = 0;
  selected.forEach(s => t += data[s] || 0);
  document.getElementById("total").innerText = "CHF " + t.toFixed(2);
}

function copy(){
  let vor = document.getElementById("vorname").value.trim();
  let nach = document.getElementById("nachname").value.trim();

  if(!vor){ alert("Bitte Vorname eingeben"); return; }
  if(!nach){ alert("Bitte Nachname eingeben"); return; }
  if(!tarif){ alert("Bitte Tarif auswählen"); return; }
  if(selected.length === 0){ alert("Bitte mindestens eine Dienstleistung wählen"); return; }

  let name = `${vor} ${nach}`;
  let tarifKurz = tarif === "Standard" ? "S" : "L";

  let nums = selected
    .map(s => nummern[s])
    .filter(Boolean)
    .sort((a,b) => a - b);

  let copyText = `${name}, ${tarifKurz}, ${nums.join("+")}`;
  copyText = copyText.substring(0,30);

  navigator.clipboard.writeText(copyText);

  let total = 0;
  let preise = getPreise();
  selected.forEach(s => total += preise[s] || 0);

  let sales = JSON.parse(localStorage.getItem("sales") || "[]");
  sales.push({
    date: new Date().toISOString(),
    name: name,
    tarif: tarif,
    services: [...selected],
    total: total
  });
  localStorage.setItem("sales", JSON.stringify(sales));

  let btn = document.getElementById("copyBtn");
  btn.classList.add("success");
  btn.innerText = "Kopiert ✓";
  btn.disabled = true;
  copied = true;
}

function showAnalyse(){
  document.getElementById("kasse").style.display = "none";
  document.getElementById("analyse").style.display = "block";
  loadAnalyse();
}

function showKasse(){
  document.getElementById("analyse").style.display = "none";
  document.getElementById("kasse").style.display = "block";
}

function loadAnalyse(){
  let data = JSON.parse(localStorage.getItem("sales") || "[]");

  let now = new Date();
  let todayTotal = 0;
  let weekTotal = 0;
  let monthTotal = 0;
  let yearTotal = 0;
  let totalTotal = 0;

  let serviceCount = {};
  let customerTotal = {};

  data.forEach(entry => {
    let d = new Date(entry.date);
    totalTotal += entry.total;

    if(d.toDateString() === now.toDateString()){
      todayTotal += entry.total;
    }

    let diffDays = (now - d) / (1000 * 60 * 60 * 24);
    if(diffDays <= 7){
      weekTotal += entry.total;
    }

    if(d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()){
      monthTotal += entry.total;
    }

    if(d.getFullYear() === now.getFullYear()){
      yearTotal += entry.total;
    }

    entry.services.forEach(s => {
      serviceCount[s] = (serviceCount[s] || 0) + 1;
    });

    customerTotal[entry.name] = (customerTotal[entry.name] || 0) + entry.total;
  });

  let topServices = Object.entries(serviceCount)
    .sort((a,b) => b[1] - a[1])
    .slice(0,5);

  let topCustomers = Object.entries(customerTotal)
    .sort((a,b) => b[1] - a[1])
    .slice(0,10);

  let content = `
    <div class="box">Heute: CHF ${todayTotal.toFixed(2)}</div>
    <div class="box">Woche: CHF ${weekTotal.toFixed(2)}</div>
    <div class="box">Monat: CHF ${monthTotal.toFixed(2)}</div>
    <div class="box">Jahr: CHF ${yearTotal.toFixed(2)}</div>
    <div class="box">Total: CHF ${totalTotal.toFixed(2)}</div>

    <div class="box">
      <div class="smallTitle">Top 5 Dienstleistungen</div>
      ${topServices.length ? topServices.map(s => `${s[0]} (${s[1]}x)`).join("<br>") : "Noch keine Daten"}
    </div>

    <div class="box">
      <div class="smallTitle">Top 10 Kundinnen</div>
      ${topCustomers.length ? topCustomers.map(c => `${c[0]} — CHF ${c[1].toFixed(2)}`).join("<br>") : "Noch keine Daten"}
    </div>

    <div class="box">
      <div class="smallTitle">Alle Einträge</div>
      ${data.length ? data.slice().reverse().map(entry => `
        <div style="margin-bottom:14px;">
          ${new Date(entry.date).toLocaleDateString()}<br>
          ${entry.name}<br>
          ${entry.services.join(", ")}<br>
          CHF ${entry.total.toFixed(2)}
        </div>
      `).join("") : "Noch keine Daten"}
    </div>
  `;

  document.getElementById("analyseContent").innerHTML = content;
}

render();
calc();
</script>

</body>
</html>
